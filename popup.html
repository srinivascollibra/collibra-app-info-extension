<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collibra App Info</title>
    <style>
      :root {
        --bg:               #ffffff;
        --text:             #1a1a1a;
        --title:            #001f5b;

        --info-bg:          #eef3ff;
        --info-border:      #bfcfee;
        --info-label:       #555;

        --btn-icon-bg:      #ffffff;
        --btn-icon-border:  #d1d5db;
        --btn-icon-color:   #374151;
        --btn-icon-hover:   #f3f4f6;

        --divider:          #e5e7eb;
        --summary-color:    #555;
        --summary-arrow:    #888;

        --label-color:      #444;
        --input-bg:         #ffffff;
        --input-border:     #cccccc;
        --input-color:      #1a1a1a;
        --hint-color:       #666;

        --fetch-bg:         #4b5563;
        --fetch-hover:      #374151;

        --success-bg:       #f0fdf4;
        --success-border:   #86efac;
        --success-color:    #15803d;
        --error-color:      #b91c1c;

        --preview-bg:       #f4f4f5;
        --preview-color:    #1a1a1a;

        --footer-color:     #aaaaaa;

        --warn-bg:          #fff7ed;
        --warn-border:      #fb923c;
        --warn-color:       #9a3412;

        --loading-color:    #666666;

        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:               #1c1c1e;
          --text:             #e5e5e7;
          --title:            #93b4ff;

          --info-bg:          #1c2a42;
          --info-border:      #2d4070;
          --info-label:       #9ca3af;

          --btn-icon-bg:      #2c2c2e;
          --btn-icon-border:  #3a3a3c;
          --btn-icon-color:   #d1d5db;
          --btn-icon-hover:   #3a3a3c;

          --divider:          #3a3a3c;
          --summary-color:    #9ca3af;
          --summary-arrow:    #6b7280;

          --label-color:      #d1d5db;
          --input-bg:         #2c2c2e;
          --input-border:     #3a3a3c;
          --input-color:      #e5e5e7;
          --hint-color:       #9ca3af;

          --fetch-bg:         #374151;
          --fetch-hover:      #4b5563;

          --success-bg:       #052e16;
          --success-border:   #16a34a;
          --success-color:    #4ade80;
          --error-color:      #fca5a5;

          --preview-bg:       #2c2c2e;
          --preview-color:    #e5e5e7;

          --footer-color:     #6b7280;

          --warn-bg:          #2d1b0a;
          --warn-border:      #c2410c;
          --warn-color:       #fb923c;

          --loading-color:    #9ca3af;
        }
      }

      body {
        margin: 0;
        width: 320px;
        padding: 12px;
        box-sizing: border-box;
        background: var(--bg);
        color: var(--text);
      }

      .ext-header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 12px;
      }
      .ext-header img { display: block; height: 28px; width: auto; }
      .ext-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--summary-color);
        line-height: 1.2;
        letter-spacing: 0.03em;
      }

      #loading {
        display: none;
        font-size: 12px;
        color: var(--loading-color);
        text-align: center;
        padding: 6px 0 10px;
      }

      /* Auto-detected info panel */
      #autoInfoPanel { display: none; }

      .info-card {
        background: var(--info-bg);
        border: 1px solid var(--info-border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 3px;
      }
      .info-row:last-child { margin-bottom: 0; }
      .info-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--info-label);
        flex-shrink: 0;
        white-space: nowrap;
      }
      .info-value {
        font-size: 11px;
        font-family: ui-monospace, Menlo, monospace;
        color: var(--text);
        text-align: right;
        word-break: break-all;
      }

      .action-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
        align-items: stretch;
      }
      .btn-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        flex-shrink: 0;
        border: 1px solid var(--btn-icon-border);
        border-radius: 6px;
        background: var(--btn-icon-bg);
        cursor: pointer;
        color: var(--btn-icon-color);
        padding: 0;
      }
      .btn-icon:hover { background: var(--btn-icon-hover); }
      .btn-jira {
        flex: 1;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .btn-jira:hover { background: #1d4ed8; }
      .btn-icon:disabled,
      .btn-jira:disabled { opacity: 0.6; cursor: not-allowed; }

      /* Not-Collibra banner */
      #notCollibra {
        display: none;
        background: var(--warn-bg);
        border: 1px solid var(--warn-border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 12px;
        font-weight: 600;
        color: var(--warn-color);
      }

      /* Override section */
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        font-size: 12px;
        color: var(--label-color);
      }
      #projectBase {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid var(--input-border);
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 13px;
        background: var(--input-bg);
        color: var(--input-color);
      }
      #projectBase:focus {
        outline: 2px solid #2563eb;
        outline-offset: 1px;
      }
      #hint {
        font-size: 11px;
        color: var(--hint-color);
        margin: 0 0 8px;
        line-height: 1.35;
      }
      #fetchBtn {
        width: 100%;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: var(--fetch-bg);
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #fetchBtn:hover { background: var(--fetch-hover); }
      #fetchBtn:disabled { opacity: 0.6; cursor: not-allowed; }

      /* Collapsible override section */
      details {
        margin-top: 12px;
        border-top: 1px solid var(--divider);
        padding-top: 10px;
      }
      summary {
        font-size: 12px;
        font-weight: 600;
        color: var(--summary-color);
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 5px;
        user-select: none;
      }
      summary::-webkit-details-marker { display: none; }
      summary::before {
        content: "▶";
        font-size: 9px;
        color: var(--summary-arrow);
        transition: transform 0.15s;
        display: inline-block;
      }
      details[open] summary::before {
        transform: rotate(90deg);
      }
      .override-body {
        margin-top: 10px;
      }

      #status {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #status.error { color: var(--error-color); }
      #status.success {
        color: var(--success-color);
        background: var(--success-bg);
        border: 1px solid var(--success-border);
        border-radius: 6px;
        padding: 8px 10px;
      }

      #preview {
        margin-top: 8px;
        padding: 8px;
        background: var(--preview-bg);
        color: var(--preview-color);
        border-radius: 6px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 120px;
        overflow-y: auto;
        display: none;
      }
      #preview.visible { display: block; }

      footer {
        margin-top: 14px;
        text-align: center;
        font-size: 11px;
        color: var(--footer-color);
      }
    </style>
  </head>
  <body>
    <div class="ext-header">
      <picture>
        <source srcset="icons/logo-reverse.png" media="(prefers-color-scheme: dark)" />
        <img src="icons/logo.png" alt="Collibra" />
      </picture>
      <h1 class="ext-title">Application Information</h1>
    </div>

    <div id="loading">Fetching version info…</div>

    <div id="notCollibra">This is not a Collibra environment.</div>

    <!-- Auto-detected info (Collibra instances only) -->
    <div id="autoInfoPanel">
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">URL</span>
          <span id="infoUrl" class="info-value"></span>
        </div>
        <div class="info-row">
          <span class="info-label">DGC Version</span>
          <span id="infoDgcVersion" class="info-value"></span>
        </div>
      </div>
      <div class="action-row">
        <button id="copySimpleBtn" class="btn-icon" title="Copy URL &amp; DGC version">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="5.5" y="5.5" width="8" height="9" rx="1.25" stroke="currentColor" stroke-width="1.4"/>
            <path d="M3 10.5V3C3 2.17 3.67 1.5 4.5 1.5H10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="copyJiraBtn" class="btn-jira">Copy for Jira</button>
      </div>
    </div>

    <!-- Collapsible manual override -->
    <details>
      <summary>Try Another Environment</summary>
      <div class="override-body">
        <label for="projectBase">Base URL</label>
        <input
          id="projectBase"
          type="url"
          placeholder="https://your.collibra.com"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="hint">Fetches <code>/rest/2.0/application/info</code> from the given base URL.</p>
        <button type="button" id="fetchBtn">Fetch info</button>
      </div>
    </details>

    <div id="status" role="status" aria-live="polite"></div>
    <pre id="preview" aria-hidden="true"></pre>
    <footer>Collibra | v1.0.2 (May 16, 2026) | &copy; 2026</footer>
    <script src="popup.js"></script>
  </body>
</html>
